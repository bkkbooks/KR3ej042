body:
  text: 第一章麻疹症候本病之潛伏期通常十日至十一日少則九日或七日潛伏期短則前驅期長從傳染至發現通常為期十四日在此時期中雖不呈何種症象亦有輕度之障礙如遊戲心減感覺疲勞食欲不振輕者呈加答兒症狀晚來體溫上升是等症候尤在前驅期為顯著前驅期通例三日或五日始現加答兒與熱候亦有不顯著者眼瞼結膜強而發赤分泌多量膿性黏液而起羞明鼻黏膜亦同樣腫脹有噴嚏間有衄血者同時或兼發遲緩之乾性咳嗽發聲嘶嗄而呈假性格魯布狀此期之體溫第一日三十八度五分乃至三十九度五分經過前驅期則溫度高升自覺頭痛食欲不振嘔吐下痢咳嗽往往妨及睡眠在此時期以口腔黏膜咽頭及扁桃腺之加答兒外在診斷上尤所緊要者即是克蒲利子枯氏斑其先皮膚髮疹在一二日或三日之中口頰黏膜及下列臼齒之對部分發現小斑呈針帽頭大之鮮紅色其中央有真珠樣白色之圓點觸之覺平面稍稍隆起此即克蒲利子枯氏斑決不現於他種疾病故在診斷上甚有價值在發疹之前一二日屢在克蒲利子枯氏斑上現固有之黏膜色鮮紅而軟或者硬口蓋黏膜上呈小星狀之紅色斑發疹如無減輕之傾向則症狀更增凶惡體溫上升眼瞼結膜發赤極強畏明鼻加答兒及咳嗽均烈全體亦現強烈之症狀麻疹發斑初現小紅色其斑恆在耳殼之前後及顏面頭部極易擴大於軀幹上膊大腿前膊等處約二日而遍及全身矣最初斑形甚小漸次大如帽針頭繼達豌豆之大其扁平者稍隆起其色初鮮紅漸次而成火焰色其形之大小如不規則之星狀皮疹發生繁多以致互相融合呈現種種不整齊之形狀但決無廣泛性在各不整形之斑間常有正規色之健康皮膚存在神經質之小兒故有癢感發疹達於全盛時代一二日後始漸次褪色從發生之順序平均二日為發疹之始三日至四日漸次消失留褐色之痕迹褐色斑則經十日乃至二十日尚能認出也以後為落屑期即發疹消去時期此期中皮膚之狀況與猩紅熱無異顏面有粳粃狀之小鱗屑其他部位通常甚弱漸次於一周內剝落其體溫熱度如無合併症常與發疹出現共同上升至第三日發疹時仍保持稍同之程度此為達點時期以後則溫度下降其最高溫度三十九度至四十度或四十度與四十一度本病之經過中屢起中耳炎此炎症由歐氏管蔓延而來舌乾燥而被白苔口唇乾如裂創開口則感疼痛並有難堪之乾性咳嗽至發痛時期則往往輕快聽診時肺臟不異於尋常其屢屢有濕性之水泡音者乃挾腸加答兒腎臟炎肺炎腦膜炎等症之併發症矣療法前驅期即黏膜之加答兒症狀時期應用葛根湯發疹期尚可用之此時屢現小柴胡湯證又見高熱煩渴舌白苔而乾燥口唇乾如欲裂者則當用石膏之配劑可選用大青龍湯小青龍湯加石膏湯越婢湯越婢加半夏湯白虎加人參湯竹葉石膏湯等又可用葛根湯加石膏小柴胡湯加石膏中耳炎初期亦多用葛根湯逮化膿時則頓服排膿湯或排膿散病勢進行則服小柴胡湯或小柴胡加石膏或用大柴胡湯排膿不止時兼用伯州散腸加答兒可用葛根湯葛根黃芩黃連湯小柴胡湯黃芩湯甘草瀉心湯之類其兼肺炎者亦當從證選用麻症之治方若頻發咳嗽不止則用橘皮竹茹湯半夏厚朴湯麥門冬湯之類其起腦膜炎者可服調胃承氣湯桃核承氣湯大小柴胡湯葛根湯白虎加人參湯有時四逆湯真武湯之類亦可用之備考保嬰撮要葛根黃連湯葛根黃建黃芩湯亦同麻疹之後治身熱極效張氏醫通乾薑黃芩人參湯主治麻痹兼治痢病類聚方廣義罹麻疹脈浮數發熱身痛腰痛喘咳諸症表實而疹發不齊者用麻黃湯大青龍湯主治麻疹脈浮數寒熱頭眩身體疼痛喘咳及汗出而煩躁者麻疹初期惡寒發熱脈浮數或乾咳下痢用葛根湯若寒熱甚熾咽頭有刺戟症狀心胸煩悶者兼用黃連解毒湯麻疹胸脅苦滿心下硬塞嘔吐腹滿痛脈沉者用大柴胡湯麻疹大熱讝語煩渴唇舌燥裂脈洪大者用白虎湯栗園雜纂麻疹兼喘惡候也諺云喘而咳嗽者可療喘而不咳嗽者難治麻疹為熱毒故舌多胎白苔者輕黃苔者重麻疹之色鮮明如錦者吉黑晦如煤者凶不出於頭面者重紅紫黯者亦為重症凡出麻疹者貴透徹故先用發表劑使毒盡達肌表若誤投寒涼之藥毒必內伏不能透出故多毒氣內攻甚或喘悶而斃麻疹現形三日之後漸次沒落不早不遲佳候也一二日後疹即收沒者常有變證宜謹慎調攝切勿大意須防風寒之侵襲及避穢氣之觸受否則其毒往往內攻輕者煩渴譫狂重則神昏悶亂疹毒上衝以致血液妄行溢出鼻孔宜用解毒之劑毒解則血溢亦止麻疹之餘毒未盡則發生種種變端或於膚表結成瘡毒治之不易若在耳眼筋骨者亦難於醫治其或精氣不振形體羸瘦精神倦怠飲食減少咳嗽不止便泄不實餘熱不除等證往往變為勞瘵橘窗書影麻疹最初用葛根加桔梗湯使發汗往來寒熱似瘧者用小柴胡湯疹已出而躁煩口渴者用白虎湯煩渴而瀉下者用豬苓湯便泄不止者用柴胡湯小承氣湯吐血衄血者用瀉心湯輕者用黃芩湯餘熱未退者用竹葉石膏湯微熱咳嗽不止者用小柴胡加葛根草果天花粉第二章猩紅熱原因猩紅熱亦屬麻疹等之傳染性小兒病且較麻疹為多大人亦有患之者猩紅熱有先天的永久免疫性故人有終生不罹此疾者其有仍罹猩紅熱者大抵未得後天之免疫性耳症候猩紅熱之潛伏期不足二十四小時平均持續四日乃至七日前兆期亦往往不過數時間多則一日至二日其起時反覆惡寒或始於一日之戰栗小兒則發全身痙攣次則體溫上升達三十九度乃至四十度噁心嘔吐心悸亢進全身倦怠頭痛咽喉疼痛咽下困難咽頭黏膜及扁桃腺發赤且腫脹舌之邊緣強度發赤中央及底基部帶青灰白色灰白黃色之苔脈搏與體溫升騰時增加五百二十至五百五十之間發疹期之體溫更上升一層脈搏亦增多發疹先發現於頸部及鎖骨部此後於二十四至四十八小時之內蔓延於軀幹及四肢惟顏面較少而頤部及鼻部局所的血管痙攣而呈蒼白色此為鑑別徵候之要點猩經熱之發疹呈鮮活之赤色粗看之有平等蔓延之狀熟視之發現集簇無數之深紅色細點壓之則褪色皮膚之潮紅漸次增加患者往往感覺焮灼辛辣或感皮膚瘙癢末梢部之淋巴腺往往腫脹最甚者感壓痛此期軟口蓋及懸壅垂並扁桃腺更增腫大其他顎下腺亦增腫大頸腺耳後腺腋窩腺肘腺鼠蹊腺等亦腫大此期舌面深紅色菌狀乳嘴腫脹此所謂覆盆子舌或貓舌也舌面凸凹相交其狀如覆盆與貓舌皮膚髮現疹點後三日或四日始達極度三日至四日間持續不變漸次褪色其後一周之後漸次褪盡皮膚外觀恢復發疹期後即落屑期亦有發疹期未終了即開始落屑期者通常發疹後最早發現落屑之部位為頸部落屑稀如粳粃狀多連續片及膜狀即層片狀之落屑為猩紅熱之特徵落屑期中體溫無變化故患者頗覺爽快喜靜臥此期持續平均十四日患者於感染後第四周之終乃全愈療法初起時患寒用葛根湯大青龍湯發熱噁心嘔吐者用小柴胡湯以上凡口渴躁煩頭痛者用小柴胡湯加石膏或白虎加人參湯咽頭腫痛與咽下困難者用桔梗湯排膿湯排膿散之類淋巴腺顯著腫大用小柴胡湯加石膏大柴胡湯四逆散小陷胸湯等嘔吐者不能不藥用甘草湯小半夏加茯苓湯併發病之治方可參照各疾病條下第三章百日咳本病呈一種特有之發作性咳嗽為接觸傳染病之一古之疫咳頓嗽痙咳即此病也原因由於咳嗽之際唾液涎沫飛散成為間接傳染凡人多有感染素質故屢屢流行一歲至三歲者最易感染一經遭罹後能得後天之免疫性故罕有再犯者症候潛伏期之持續不一平均一周短者三四日長則二周前驅期與病發期有種種之程度大體區別為三期一加答兒期其始為鼻加答兒咳嗽結膜潮紅嘶嗄等之症狀與單純之加答兒甚難區別此症候經過一周或二周或半周或四周咳嗽漸次猛烈頻發於夜間而有一定時間之發作性二痙攣期強迫的咳嗽夜間尤多痙咳發作屢有前兆如不安不快頸部或癢或胸部感覺壓迫趨於母懷或憑於椅桌器物之上更有咳而嘔吐者發作時先見延長深呼吸次即連發盛烈之短咳其間吸氣不利顏面潮紅結膜發赤開口則舌出於外此發作未終又復加頻咳如此返復數回遂呈窒息狀態最後排出黏稠如玻璃狀之黏液而為一發作之終此發作一晝夜通例五回或十回有時達三十回以上痙攣期普通三周至六周三輕快期又此期發作性之次數與強度均減嘔吐亦除特種之性狀亦失但加答兒性狀之咳嗽則永永存留經過三期如無合併症則四周至十周可愈此時之小兒顯然衰弱為結核發生之好機會如在輕快期中復罹氣管枝加答兒則必更起痙咳以上所述為中等症候輕者經過二三周往往不呈顯著之發作反之重篤之症狀則高熱不安障礙睡眠脈搏速發作劇呼吸困難嘔吐劇烈此時雖無併合症亦能致死療法加答兒期中有一般風邪時用麻黃湯葛根湯小青龍湯小柴胡湯加減之入痙攣期呈痙攣性之咳嗽者用甘草乾薑湯苓桂甘草湯苓桂五味甘草湯柏葉湯之類而半夏厚朴湯橘皮竹茹湯桔梗湯小柴胡湯麥門冬湯等亦可從證運用之余對於百日咳內服以上方劑更須限制肉食其體質衰弱者嚴避風寒因肉食則必發作猛烈而回數增加禁肉食能使發作頓減屢試不爽故也今日西醫所使用之藥治百日咳者如康德兒基夫亞兒屋伊希寧可衣希富斯登等之中亦稍有效果但因注射時之哭泣往往引起病之發作而基夫亞兒之注腸尤足致身體於衰弱既苦幼兒而復奪其生命豈西醫家之所能顧到哉知友松村又一君其長男畝夫君於昭和七年春罹百日咳近鄰之醫家加以療治病勢益劇身體衰弱求治於余乃與小柴胡湯合甘草乾薑湯內服一月即漸痊愈又八年六月長女畝美君罹百日咳與小柴胡湯合半夏厚朴湯分十日投之亦見全愈云蕉窗雜話頓嗽百日咳之治方明清方書有麥門清肺飲數種但冗雜而少效余近用橘皮竹茹湯加半夏蘇子羸瘦咳逆甚者兼用麥門冬湯加五味子桑白皮其勢劇者用勝聖散鼴鼠霜一味日久咳不止者用參花煉人參天花粉煉蜜大抵收效第四章窒扶的里窒扶的里者因窒扶的里菌惹起之一種接觸性傳染病也患咽喉或其他之黏膜尤在上氣道黏膜上附生義膜又因菌體上發生之毒素起中毒症狀引起麻痹原因窒扶的里菌為病原二歲至五歲之兒最多罹患之症候窒扶的里之症候頗多因其病機之位置傳染之強度及各人之素質而異而以現於扁桃腺者為最多潛伏期無一定大抵二日至四日當發病之時多現一般症狀即顏貌蒼白倦憊食欲減退有時嘔吐頭痛年長之小兒感咽下困難其次體溫升至三十八度或三十九度脈搏頻數顎下腺稍稍腫大有壓痛舌生白苔從咽頭可以望見兩側扁桃腺亦現中等度之腫大或潮紅其一側或兩側之表面約占三分之一或占半面積之白色義膜其初期不遇見其中等度之扁桃腺炎或腺上生輕度之黏液異物此義膜隨扁桃腺腫大炎症遂增加而速擴甚至有將扁桃腺全蔽之狀在此程度中病機屢進行而屢停止同時側方及咽頭後壁擴大四五日之後義膜亙兩扁桃腺軟口蓋懸雍垂及咽頭壁之一部扁桃腺炎亦漸擴大兩側相接分泌多量之黏液膿性物致起呼吸困難而發鼾聲口腔生惡臭顎上淋巴腺亦強烈腫大而壓痛全身症狀日日增加熱候上下於三十八度乃至三十九度五分之間脈搏頻數微小顏貌蒼白呈苦悶之狀食思缺乏咽下感疼痛睡眠妨礙此際內臟諸器官大概無變肺臟依然常態心臟往往有僧帽瓣及肺動脈收縮期的雜音脾臟肝臟稍稍腫大尿中多見蛋白及圓壔以上為中等疫病症狀輕者無全身症狀重者發高熱嘔吐頭痛年長之小兒感咽下困難扁桃腺於發病第一日已稍被帶汙穢色之義膜此時懸雍垂軟口蓋及咽頭後壁迅速擴大扁桃腺強度腫大與懸雍垂同遮咽頭內之視界咽下顯著障礙鼻扎不能呼吸口內放出惡臭屢屢分泌多量之水樣或血性顎下淋巴線強度腫脹其周圍組織生侵潤強壓痛持續至五日乃至七日往往起氣管枝肺炎全身症狀早犯者顏面顯著蒼白呈無欲狀態口渴食思全無體溫升至三十九度乃至四十度五分入高熱情形脈搏小而頻數緊強而弱二日之後脈搏幾無不能按尋心絃微弱心尖有雜音肝臟腫大又恆起腎臟炎此名為腐敗性窒扶的里或惡性窒扶的里喉頭上占居窒扶的里者其症甚為危險但屢有遭遇之者尤以幼稚之小兒童為甚症候來時聲音嘶嗄經日竟致全無聲息咳嗽乾性所謂格魯布咳也此症呈特有之犬吠聲或軋鳴聲之性質同時又現前後喉頭狹窄之症狀即吸氣曳長有雜音呼氣亦生障礙呼吸困難則血液之炭酸增積以致口唇口圍指爪發現青紫色身體不安不能靜臥感激烈之呼吸困難空氣有稍稍從聲門通過之模樣顏面四肢蒼白色汗冷意識溷濁此外有來自鼻腔口腔結膜皮膚等之窒扶的里者患屢起氣管加答兒及氣管枝肺炎或併發心臟炎而起心臟麻痹咽頭窒扶的里之後亦有起口蓋筋麻痹療法窒扶的里血清有效果吾人於內服藥之外必注射窒扶的里血清扁桃腺腫大附著義膜或黏液膿性之分泌物凝著之際宜與排膿湯排膿散桔梗湯半夏苦酒湯或頓服桔梗白散本病之中等程度以上屢有口渴煩躁高熱舌見白苔亦見乾燥者宜從證選用白虎湯類之方劑如小柴胡湯加石膏大青龍湯越婢加半夏湯喉頭窒扶的里狹窄症狀必施用手術在用手術以前頓服桔梗白散使義膜大半吐出便見輕快重症如半毒狀者屢見腳氣衝心而訴苦悶者最為危候其症情為大小便閉塞胸腹膨滿抵抗強大胸內甚苦悶全身呈急性鬱血之症狀肝脾腫大脈微而細數如此之際即打窒扶的里血清亦無效宜速服走馬湯使之吐下冀其萬一之生第五章流行性耳下腺炎本病為耳下腺急起腫脹所謂觸接性傳染病也人呼為之蝦蟆瘟或呼時毒或稱痄腮發頤原因本病之原因未明五歲至十五歲之兒童尤易罹之症候潛伏期二周半至三周前驅期半日或一日以上覺不快不安食欲不振或惡寒或輕熱衄血耳內騷鳴或感疼痛病之發生始於耳下腺腫脹初在側面耳殼下先見腫大此際無壓病皮膚多變化僅覺光澤紅潮感微熱者甚稀腫大二日至三日漸次大增從乳嘴突起占有下顎角之間壓上耳殼頤部一體腫大呈異樣容顏腫脹漸大附近亦生浮腫感不快之緊張口之開閉困難咀嚼疼痛耳重聽感疼痛如此極度腫大經過二日即急速減退同時其他唾液腺即顎下腺舌下腺亦腫大熱候不定多與腫脹同現或有稍前發熱持續三日至五日通常三十八度乃至三十九度之間重則三十九度以上至四十度者腫脹減退熱先下降又熱候不明其經過一側耳下腺之終止期乃五日至七日其兩側者乃十日至十二日惡液汁化膿者極稀本病屢與睪丸炎併發成人者多未成年者少通常耳下腺漸有腫大疼痛乃併發睪丸炎也其後睪丸必致瘦削故若兩側均犯者每不能生殖婦女卵巢及乳腺起同樣之炎症與男子同至於引起腦膜炎而致死亡者甚稀療法初期在表證者用葛根湯或麻黃杏仁薏苡甘草湯表證去而僅耳下腺腫脹者小柴胡湯小柴胡湯加石膏鮮有用大柴胡湯者起睪丸炎起卵巢乳腺炎症者宜用小柴胡湯加石膏白虎湯有意想不到之顯著效力第六章哈伊耨梅琴氏病哈伊耨梅琴氏病者乃流行性或散存性之中樞神經系統之一種病型即脊髓前角灰白色之炎症惟不限於脊髓之前角大腦延髓等亦有惹起病變者故其病型頗不一律症候潛伏期五日至十日大多平均九日其次繼以發熱之前驅症狀續現初期麻痹因麻痹而往往波及其他障礙據烏伊芝枯孟氏之分類為下列之八種一脊髓前角炎脊髓性小兒麻痹前驅期之主要徵候為發熱突然升至三十九度以上或至四十度脈搏頻數同時症狀意識明瞭但有時則稍溷濁嗜眠此時期局所的變化為安魏那氣管枝炎消化障礙嘔吐下痢或便祕或全身痙攣熱在第一日溫度升降不一其延一周至二周者為例外初期之診斷極為困難可以留意其重要症狀為皮膚之知覺過敏四肢背部疼痛自發痛與運動時之疼痛及顯著發汗前驅期二日至三日初發麻痹繼及廣泛部分此際以痙攣搐搦等為前行麻痹多弛緩性能犯下肢及軀幹而至上與腦神經之分布區域麻痹之擴布能在二三日中達其最大範圍其後漸次縮小最初麻痹難以認識不過膝蓋腱反射缺損筋肉緊張度減少正坐困難而已犯及腹筋之腹部為鼓腸性之膨滿此亦屢見於初期此時膀胱及直腸亦起一時性之障礙初發麻痹若不漸次消退遂入某筋簇而成持久性之麻痹此麻痹湯弛緩性之末梢性萎縮性麻痹對於電氣呈變性反應故初期對於機械的作電氣刺戟有興奮性呈完全性反應之筋肉不能冀其筋肉運動之恢復經過時日筋起萎縮漸見羸瘦遂及於骨骼與皮膚持久性麻痹往往為一下肢未有一上肢者有時起上下肢交叉性或偏側性且其麻痹全肢不平等發現而犯某部筋簇下肢腓骨筋或四肢股筋前筋骨筋同時犯者最多上肢之三角筋犯者亦最多初期屢見軀幹及頸部諸筋之麻痹腹筋麻痹腹壁貽限局性之萎縮部麻痹之恢復早者一周遲者半年或半年以上持久性麻痹之結果肢之發育顯然因障礙而短小其皮膚屢現作蒼白色或現青紫色腱側比較冷感又或筋簇麻痹其正反對筋之收縮攣縮變形漸次因腱之萎縮筋肉之纖維變性而堅固其病的位置二朗礙里氏麻痹型乃上行性脊髓麻痹初現下肢麻痹急速及於軀幹上肢犯及呼吸中樞以致死亡三延髓及腦橋性麻痹其重篤之經過則腦橋及延髓起腦神經麻痹即視神經顏面神經眼球筋懸雍垂舌下神經等之麻痹能速迷走神經而犯呼吸中樞四大腦性麻痹腦實質炎之際見痙攣性麻痹即腦性小兒麻痹之象五小腦性麻痹即失眠症六多發神經炎症即諸處神經炎之症狀七腦膜炎症意識溷濁頸部強直呈皮膚知覺過敏等恰如腦膜炎之狀八不全症或頓挫症流行時屢見不鮮若見於不流行之時者而有顯著之前驅症則完全可以治愈療法前驅期用葛根湯小柴胡湯之類倘其麻痹不去則從證可用桂子加附子湯桂枝去芍藥加附子湯桂枝加苓朮附子湯當歸芍藥散八味丸黃耆建中湯之類第七章小兒赤痢附疫痢原因赤痢者由細菌或一種之阿米巴惹起之傳染性大腸疾患也症候潛伏期二日或三日或至八日發病之時屢有發熱其幼少者或於發熱之前後起痙攣重要之症候其糞便之性狀初則日下數回之通常痢便後下黏液便與似血液之膿汁頻催便意裡急後重排便一日達十數回至數十回排泄量微下腹部多刺痛食欲減口渴舌被白苔噁心嘔吐其初腹部多膨滿由於左側腹骨窩通腹壁腹壁腫厚如索體狀受壓而覺疼痛後期則腹部陷凹病勢因糞便之性質而有種種有時軟便中和黏液此中散見線狀或點狀之血液或混多量之血液有時多膿汁之含量或如肉汁者鮮有凝固之黏液呈腐敗色而放惡臭肛門因頻次排便而發赤起括約筋麻痹或脫肛體溫從種種之病勢而異並無一定一二日至五日最高漸次渙散脈搏亦隨熱而同其增減一般經過一周或二周排便之度數漸減血液黏液之含量亦減退混和之糞塊漸多遂如普通糞便但繼起衰弱者往往發生不幸小腸同時亦病突然發高熱嘔吐痙攣頻發有嗜眠狀脈搏微弱頻數便不通或出數回之黏液便或血樣黏液便漸次陷於昏睡則發病後十二時至四十八小時內多至於死疫痢為赤痢之重症夏秋之候甚多前驅症為頭痛腹痛嘔吐等漸次發熱解出軟便或下痢便經數時間突然出四十度以上之高熱漏黏液便眼球上轉四肢搐搦或全身發痙攣陷於昏睡便通而不祕結大多一日一回至五回黏液混雜血液此病之患者腹部極柔軟療法發病之初期表證時間與葛根湯與大人之赤痢無異若嘔吐者用葛根加半夏湯小腹赤痢或疫痢初期不得用葛根黃連黃芩湯若腹部膨滿大便不通或裡急後重便不快通者用大承氣湯或調胃承氣湯口渴煩躁舌乾燥見白苔白虎加人參湯嘔吐不止者頓服半夏乾薑人參湯熊膽末口渴小便不利咳而吐出水樣物者五苓散主之吐蛔蟲手足厥冷形勢危篤者速投與烏梅丸肛門熱裡急後重強者可用白頭翁湯白頭翁加甘草阿膠湯病勢稍緩症狀輕快而有回覆傾向者用小柴胡湯大柴胡湯黃芩湯甘草瀉心湯之類脈微細如絶吐利手足厥逆者用四逆湯真武湯等類疫痢之用希麻西油為今日之一般常識余亦於八年前深知漢方甚愛用之腸洗滌則濫用林搿兒油等之注射但患疫痢者大半為腸實症而非陽虛證投以下劑幸病勢不見惡化者幸也現有一部分之學者主疫痢嚴禁用希麻西油蓋洞悉其弊害矣然疫痢不絶對禁忌下劑陽實證可下陽虛證則不可下也換言之下劑之標準當視患者之體質與病勢為斷希麻西油亦不能認為純無效果備考本間棗軒之談小兒疲勞身體羸瘦不能用大黃者可用四逆散或錢氏白朮散或柴苓湯等疲勞極點脈沉微四肢厥冷或撥開衣被輾轉反側作搖頭弄舌之煩躁或上竄或乾嘔或出冷汗或乳飲口渴者無真氣也肛門洞開不閉呼吸短促時出太息者皆疲極必死之候用黃芩四逆湯或四逆加人參湯或附子理中湯小兒在前述情形而在治療中不能服藥或脫陽者必死嘔吐甚而藥不能入飲食絶粒者此名噤口痢疾熱而胃口鬱滯者半夏瀉心湯主之亦可用黃芩加半夏湯或黃蓮湯或參連湯之類錢氏白朮散即人參湯中去乾薑加茯苓葛根藿香也柴苓湯即小柴胡湯合五苓散也赤水玄珠理中湯人參湯者小兒嘔吐後脾胃虛弱四肢漸次厥冷或顏面現浮腫四肢虛腫眼閉不開者用之類方廣義疫痢初起發熱惡寒脈數者先用葛根湯溫覆發汗若嘔者葛根加半夏湯發汗後用大柴胡湯厚朴七物湯大小承氣湯調胃承氣湯桃核承氣湯大黃牡丹皮湯大黃附子湯之類各視症別而與之以蕩滌裡熱宿毒橘窗書影此症俄然而來遂發大熱或惡寒手足冷或發驚搐搦天吊直視咬牙噤急或腹痛嘔吐呵欠困悶或泄瀉或洞泄下痢帶惡臭發時驚搐吐瀉齊來此為不治之症若三症俱來而勢尚緩者可治大熱下痢挾驚者用葛根黃連黃芩湯昏睡不醒者重症也劇烈下痢亦用葛根黃連黃芩湯緩者用葛根湯加黃連大下痢脈沉微昏睡下痢多者用桂枝人參湯加黃連或黃連理中湯手足厥冷者用附子理中湯或四逆加人參湯第八章佝僂病佝僂一名英吉利病即小兒哺乳期或二年之幼兒發現之本病之原因不明症候一全身症狀佝僂病之小兒神思不安多啼哭睡眠亦不良頭輾轉向背如埋頭於枕中之動作後頭部之毛髮薄頭部時發汗全身之血管運動神經障礙見蕁麻疹紅斑二骨格系統之症狀骨格軟化且變形當母親抱兒放尿時兒忽開始為疼痛狀之啼哭至使母親注意特異之孌化能見骨端軟骨腫脹長管骨與筋骨顯然腫脹同時骨幹變形彎曲遇輕度之外傷容易致起不全之折骨全身之發育亦變化身殊不長甚短小運動起居之動作亦異常小兒已能起立步行者罹此病致不能起立頭蓋骨顏面骨之發育顯然不完全頭蓋與顏面大不調和顎骨亦異常變形齒牙之發生延遲頭蓋各骨之縫合致不合而開大其縫合邊緣肥厚如近狀且前頭結節亦肥厚或顱頂結節肥厚頭蓋如傘形大囟門亦不閉鎖而開且較之普通為廣大第二年之終漸漸閉鎖後頭部小囟門及拉麻達縫合之附近柔軟壓之生陷凹多繼以顳顬靜脈之擴張佝僂病性脊髓彎曲不現於一二之脊椎骨從其度合鋭角為稍和緩的就中以後曲屈最多致現腰椎側彎亦多而少向前彎曲者胸廓與佝僂病頗為關係蓋肋骨之軟骨部與骨部之接合部肥厚外方可見外下方一列之結節各小結節之中央具是一溝從骨部而出於軟骨部胸廓變形尤在側壁更形顯然側壁偏平乳房腺與後腋窩腺之間隔短縮甚至側壁陷凹向外方凹面描成弓形又胸骨向前方突起成為鳩胸鎖骨彎曲多陷於不全骨上腕骨為極重症之彎曲骨端軟骨之腫脹不甚顯著反之前腕骨其指端之軟骨腫脹為必然之症候一方尺骨之軟骨肥厚一方橈骨軟骨肥厚骨盤腸骨櫛亦見肥厚大腿骨與趾端之骨端軟骨腫脹多前方或向外方曲久曲下腿骨兩端之骨端軟骨腫脹不全骨折及彎曲亦多故腳形呈腳或腳病勢重篤者起貧血因之皮膚色蒼白精神發育亦遲延病勢更進呈痙攣質之症狀呼吸頻數脈搏亦多食欲異常亢進腹部膨隆通便無一定肝臟觸下緣但不肥大多下垂脾腫亦見療法上記之症狀可用小柴胡湯小陷胸湯瀉心湯桂枝加龍骨牡蠣湯柴胡加龍骨牡蠣湯伯州散之類和田子真翁佝僂病之治驗引用如下日本橋區箱崎町某子年七歲其年初胸背突出漸次彎曲父母憂之乞診於某醫謂是脊柱病無法藥治去而受診於某醫院長院長亦如是言之其親戚雪中庵宇貫宗匠者余舊知也聞之不安介紹於余診時脈稍弦大腹壁攣急胸脊均突出其橫經頗大蒙以衣被背部尚覺突出時漏呻聲胸背之邊苦楚余斷曰佝僂病佝僂者脊椎之病也因脊椎兩側筋之攣縮使脊骨不得自由伸展急治不能緩治之亦能收效乃仿東洞翁治澗之法始用茯苓飲加半夏丸為主方取南呂紫圓等互通利二周後轉用柴胡丸服藥凡三周日漸次脊柱伸展通針二月半許全復如常因云佝僂病一名英吉利病為難治之症然非不治之症但治此病之機會少治驗僅得二例余嘗以此治驗以語同業某氏某後語其學生等曰彼乃一無學庸醫安有不治之病而能為彼所治者乎誇大之言何堪聽聞此語余聞之於某學生處第九章夜驚症附夜啼症原因夜驚症者睡眠中突然驚起呈恐怖狀態也患者以二歲至八歲者為多症候概於就寢後經過一時間或二三時間小兒突然發驚怖之顏貌身坐起發叫聲如遇物襲擊狀抱擁母親不能暫安須待室內光明撫而慰之始可漸漸蘇醒復其常態此間須三十餘分鐘逮完全醒覺興奮去則安靜更睡眠翌朝與尋常無異前夜事件不復記憶夜啼症哺乳之小兒患之有疼痛等之原因夜間發作啼哭妨害家人安眠夜間發作或一次亦有數次者療法夜驚症用甘麥大棗湯小建中湯等為多有時用甘草瀉心湯小柴胡湯夜啼症又多用甘草大棗湯為有效比之鼻素劑效速而易飲雖過量亦不生何等障礙備考本間棗軒之説小兒十三四歲之間睡中卒然驚起或起或如見邪祟俗名恍惚甚有每夜發者柴胡加龍骨牡蠣湯有奇驗類聚方廣義夜啼不止診小兒之腹直腹筋強攣急時芍藥甘草湯服之有奇效第十章腦膜炎腦膜炎與往昔之驚風相似考徵先人諸説驚風非單為腦膜炎現以類似之症候總稱為驚風茲揭載關於先輩諸師之治才庶對於腦膜炎方之選擇較便利云原因腦膜炎中之最普通者為結核性腦膜炎化膿性腦膜炎液漿性腦膜炎至於梅寧吉斯麻斯慢性腦水腫亦類似腦膜炎之症候也所謂驚風之治方適用之症候結核性腦膜炎者即慢驚風或慢脾風也大多現於續發性發病緩慢始而食思缺乏倦怠發熱多眠症等症狀繼而頭痛嘔吐與腦性刺戟及胃腸疾患者相異腦刺戟症狀者皮膚及五官器之知覺過敏輕微接觸即覺疼痛其他對於視覺及聽覺之感受性亦為異常運動性刺戟症狀亦多現出切齒咀嚼吸啜運動揉頭髮摘口唇攫臥床及陰部時發嘆息伸欠神識類多溷濁應答差誤項部強直反射機能亢進腦水腫之症狀則發現麻痹症狀此時神識矇朧目光昏糊呼之不答亦不知茫然自失往往發生突然之叫喚脈不正徐脈或結代陷於麻痹脈搏頻數末期發現間代性癲癇樣痙攣化膿性腦膜炎者發病之始即升高熱數日中而死神識矇朧痙攣項部強直知覺過敏發現克兒尼芝氏之病狀與前者相同液漿性腦膜炎比之化膿性腦膜炎症狀較輕但發急劇之高熱而速者亦致死療法頭痛發熱頭項強直或發痙攣脈浮者用葛根湯若兼嘔吐則加半夏湯躁煩口渴頭痛身痛無汗脈浮發者用大青龍湯煩躁頭痛痙攣口渴吞水即吐出脈浮小便不利者用五苓散顏面紅如醉有表證者用葛根黃連黃芩湯表證去而煩驚大小便不利者用柴胡加龍骨牡蠣湯大柴胡湯等熱識煩躁口渴刺戟症狀強者用白虎湯瀉心渴承氣湯之類或兼用亦可已現麻痹症狀脈微細起間代性癲癇樣痙攣者用四逆加人參湯通脈四逆加豬膽汁湯白通加豬膽汁湯等所謂梅寧吉斯麻斯者屢見於疫痢之際西醫束手無策不知如何治之投熊膽汁一味痙攣可止眠可醒在鄉里之開業者每年與患疫痢者按觸甚多術拙者致人於死殊為遺憾嘗和權藤成卿翁於幼時患疫痢父松門翁飲以熊膽味苦覺頭頂有如拔之痛苦就此不省人事旋即蘇醒味苦仍不脫翁曰藥之味苦苦而後甘方為有效備考有持桂裡急慢驚風之説小兒之驚後代之兒科總名為驚風獨明之喻嘉言博學雄辨痛斥驚風之名義指為痙病清之陳復正亦著數十萬言之書闡明喻氏之所未盡遂屏除驚風二字新立非搐類搐誤搐三種其説詳而且備余臨症二十餘年療此病每年不下十數十人熟視其所由來皆冒邪熱而起間挾宿食或因毒癖激發者其初非來自邪熱者實難名曰驚痙亦未妥然就余之觀察驚者不必為驚嚇之義目反手搐形狀如驚故稱以斯名考仲景煩驚之語又風字連屬於諸病名者其類甚多況此來自邪熱以此為名雖不中要亦不遠矣千金中稱此病為中風吾人不妨存其舊名祇要審其脈證不誤陰陽庶乎可矣驚風之急者配於肝慢者配於脾更立慢脾之一名是為三種此為後代幼科諸師之通説吾門則不必專論肝脾惟審其脈證而辨其陰陽治之發熱手足抽搐握拳口噤上竄直視脈浮數者發於陽實熱也此名急驚神色昏慢微微抽掣昏睡露睛脈沉細者伸景所謂欲寐之狀態即陰症也寒且虛者呼慢驚慢脾風者不過慢驚之敗症聶久吾曰慢脾風即以慢驚治之者其失遠甚蓋二者有分別焉熊膽汁急驚直視煩悶者先以此灌入又可治慢驚加入理中湯四逆湯為佳參連湯急驚直視煩悶者先與此湯然後下對症之藥還魂湯此方有起死回生之神效還魂之名實為不愧小兒抽搐陷於人事不省二三日不醒者用之余通家之一幼兒曾罹此病醫師群集投驚藥數方且針且灸治法殆盡一無見效病勢已極皆言不治余較諸醫後至初診其脈沉絶但細視之倣佛有生機乃向病家謂此病形勢已瀕危境就余觀之全系熱邪鬱閉已極如有幸而熱邪發泄發表之意方有指望即與還魂湯由其母抱而覆之以被須臾汗出忽然覺醒還魂湯無發汗之説今為余試以覆被之法無人先知余常值小兒之發熱昏沉者務使其發汗十無一失如此症遽用金石龍腦麝香則必不醒且邪熱深入禍起於反掌之間也大冢曰吾師湯本求真翁陷於危篤之肺炎西醫宣告不治乃下幼兒之湯以投之一二回即痊葛根湯小兒發熱手足抽搐上竄直視者急與葛根湯便止是系效仲景救痙方法風引湯瘛瘲日日數十次之發作平常之藥不能療治故須治之以奇藥逸品也柴胡加龍骨牡蠣湯治胸滿煩驚大柴胡湯小兒驚風吐乳之類多為此方之症玩味心下急鬱郁微煩七字而運用之至由驚而變痢者此尤為最良之方劑真武湯陰症用真武湯人皆知之而太陽病發汗汗出而不解其人仍發熱心悸等病猶屬陽者亟投此劑是仲景之隨機妙用也驚風亦間有此症理中加附子湯吐瀉之慢脾虛弱者亟與理中加附子湯此症為外表猶熱而里已成寒者臨診時尤須留心審視通脈四逆加豬膽汁湯兒科稱慢脾風多為此症吐止無愈兆者脾胃亡絶之候加之出冷汗厥冷四肢拘急不解脈微弱欲絶命迫旦夕者此時若與微飲微湯直等於兒戲用通脈四逆加豬膽汁湯投之或有萬一之幸焉白通豬膽汁湯下痢不止厥逆無脈危殆達於極點但乾嘔煩者胃氣尚未全竭也服此方倘微微現脈者或得有生望紫丸急驚便閉者用此下一服可蘇醒類聚方廣義急驚風痰涎由口湧出眼閉口合者先用熊膽紫丸走馬湯等吐下後大熱煩躁喘鳴搐搦不止者與大青龍湯發汗可愈慢驚風用甘草瀉心湯可愈第十一章夜尿症症候本病並無尿意又膀胱並不積尿而在不知不識之間排出多量之尿也多起於夜中睡眠時亦有見於晝間者療法患夜尿症者大別為陽證與陰證陽症用白虎湯桂枝加龍骨牡蠣湯陰證用苓薑朮甘湯八味丸屬血證者用當歸芍藥散桃核承氣湯抵當湯備考原南陽之説尿以灸為第一有效其不止者用香龍散身體虛弱者平日煎服弄玉湯加附子或八味丸香龍散者即反鼻與丁香研細之末也余嘗用伯州散屢有效弄玉湯者苓桂朮甘湯加橘皮木香黃連也有持桂里之説縮泉散治尿床之方雞屎二錢桂枝五分以上二味研末和酒每次服一錢每日三服第十二章腺病附腺病質肺門淋巴腺結核原因腺病蔓延世上而成疾患其主要徵候為慢性淋巴腺結核其他器官之骨質及關節間屢生結核性變化且本病之患者易罹諸種之慢性病本病之素因有先天性與後天性總之年高夫婦間所生之小兒侵入本病者最多或母親在懷孕時生癌腫或第三期之毒菌結核等之疾患者多有罹此病之傾向其他日常之攝生法並生活狀態亦可影響本病之發生又其他小兒病如麻疹猩紅熱水痘百日咳等之經過後本病亦易發生症候腺病性淋巴腺腫脹多發現於生後第一個月之頃就中最早被侵者為顎下及頸部之腺其他前縱膈膜腔及腹腔之淋巴腺亦蒙其變化今從下顎隅及頸圍按觸淋巴腺其腫大恰如腫瘍指尖觸之得硬圓形甚者達雞卵之大而能目擊者此等之腺不起急性炎症有時對於血壓並感敏捷腺上皮膚不變色縱膈腺淋巴腺腫脹在打診上胸骨把柄部呈濁音腹部淋巴腺之腫脹恰如腹部腫瘍纍纍得從腹壁上觸知之顎下及頸部淋巴腺往往陷於軟化且呈炎性變化即每一腺對於按觸之知覺過敏其質漸次柔軟呈波動遂起腺病周圍矣該皮膚髮赤且呈浸潤之狀暫時將外方穿破漏稀薄之膿汁其後患部往往形成瘻管有久久漏膿者反之則膿汁不穿漏於外部向下方皮下潛行達於縱隔膜或腹腔或心囊腔而惹起該處之炎症腺病者呈一種特異之顏貌我人特稱之為腺病質腺病質分二種第一種顏貌魯鈍狀口唇肥厚翻轉鼻呈梨或馬鈴薯之狀此種情形下之小兒其腦力並一般動作往往緩慢且遲鈍此種之症名遲鈍性腺病第二種則反之心身之動作甚敏鋭脈管運動神經易充奮僅微微發揚皮膚即呈旺盛之紅色顏面蒼白皮膚軟滑此種之患兒甚憐悧名為過敏性腺病云療法選用小柴胡小建中湯內補當歸建中湯大黃蟅蟲丸伯州散當歸芍藥散之類淋巴腺腫脹無論膿潰不膿潰均可擇用以上方劑在瘻孔排膿久不止者當歸建中湯可兼用伯州散或小柴胡湯合當歸芍藥散中兼用伯州散排膿已久羸瘦淋巴腺之核腫纍纍相連者大黃蟅蟲丸往往奏效遲鈍性腺病與過敏性腺病屢用小柴胡湯合當歸芍藥散小柴胡湯合小陷胸湯之類近年患肺門淋巴腺炎病之下者屢見患兒增加其病大抵大同小異暫微熱或暫咳不止或顏色晦惡或元氣衰敗其治療法亦大同小異吾人可擇用前揭之方劑則往往收效
